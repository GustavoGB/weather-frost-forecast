source:
  base_url: "https://noaa-ghcn-pds.s3.amazonaws.com"
  by_year_prefix: "csv.gz/by_year"
  metadata_files:
    - "ghcnd-stations.txt"
    - "ghcnd-countries.txt"
    - "ghcnd-states.txt"
    - "ghcnd-inventory.txt"

paths:
  raw: "data/raw"
  bronze: "data/bronze"
  silver: "data/silver"
  gold: "data/gold"

ingestion:
  default_start_year: 2005
  default_end_year: 2024
  download_workers: 4
  bronze_partitions_per_year: 8

spark:
  app_name: "ghcn-ingestion"
  master: "local[8]"
  driver_memory: "11g"
  shuffle_partitions: 1024

region:
  name: "us_corn_belt"
  country: "US"
  lat_min: 37.0
  lat_max: 49.0
  lon_min: -104.0
  lon_max: -80.0
